<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ft710ctl</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>ft710ctl</h1>
    <div id="port-banner" class="banner banner--connecting" data-state="connecting">
      <span class="banner__dot"></span>
      <span class="banner__label">connecting…</span>
    </div>
  </header>

  <main>
    <section class="panel" id="scope-panel">
      <h2>Scope</h2>

      <div class="field">
        <label for="scope-span">Span</label>
        <select id="scope-span" data-field="scope.span_khz">
          <option value="1">1 kHz</option>
          <option value="2">2 kHz</option>
          <option value="5">5 kHz</option>
          <option value="10">10 kHz</option>
          <option value="20">20 kHz</option>
          <option value="50">50 kHz</option>
          <option value="100">100 kHz</option>
          <option value="200">200 kHz</option>
          <option value="500">500 kHz</option>
          <option value="1000">1 MHz</option>
        </select>
      </div>

      <div class="field">
        <label for="scope-ref">Ref level</label>
        <div>
          <input
            type="range" id="scope-ref"
            min="-30" max="30" step="0.5" value="0"
            data-field="scope.ref_level_db"
          />
          <span id="scope-ref-display">0.0 dB</span>
        </div>
      </div>

      <div class="field">
        <label for="scope-mode">Mode</label>
        <select id="scope-mode" data-field="scope.mode">
          <option value="DSS_CENTER">3DSS Center</option>
          <option value="DSS_CURSOR">3DSS Cursor</option>
          <option value="DSS_FIX">3DSS Fix</option>
          <option value="WF_CENTER_EXPAND">W/F Center (Expand)</option>
          <option value="WF_CENTER_NORMAL">W/F Center (Normal)</option>
          <option value="WF_CURSOR_EXPAND">W/F Cursor (Expand)</option>
          <option value="WF_CURSOR_NORMAL">W/F Cursor (Normal)</option>
          <option value="WF_FIX_EXPAND">W/F Fix (Expand)</option>
          <option value="WF_FIX_NORMAL">W/F Fix (Normal)</option>
        </select>
      </div>

      <div class="field">
        <label for="scope-speed">Speed</label>
        <select id="scope-speed" data-field="scope.speed">
          <option value="SLOW1">Slow 1</option>
          <option value="SLOW2">Slow 2</option>
          <option value="FAST1">Fast 1</option>
          <option value="FAST2">Fast 2</option>
          <option value="FAST3">Fast 3</option>
          <option value="STOP">Stop</option>
        </select>
      </div>

      <div class="field">
        <label for="scope-color">Color</label>
        <select id="scope-color" data-field="scope.color">
          <option value="1">Color 1</option>
          <option value="2">Color 2</option>
          <option value="3">Color 3</option>
          <option value="4">Color 4</option>
          <option value="5">Color 5</option>
          <option value="6">Color 6</option>
          <option value="7">Color 7</option>
          <option value="8">Color 8</option>
          <option value="9">Color 9</option>
          <option value="10">Color 10</option>
          <option value="11">Color 11</option>
        </select>
      </div>

      <div class="field">
        <label for="scope-marker">Marker</label>
        <input type="checkbox" id="scope-marker" data-field="scope.marker" />
      </div>

      <div class="field">
        <label for="scope-af-fft">AF-FFT</label>
        <select id="scope-af-fft" data-field="scope.af_fft.mode">
          <option value="AF_FFT_0DB">AF-FFT 0 dB</option>
          <option value="AF_FFT_10DB">AF-FFT 10 dB</option>
          <option value="AF_FFT_20DB">AF-FFT 20 dB</option>
          <option value="OSC_0DB">Oscilloscope 0 dB</option>
          <option value="OSC_10DB">Oscilloscope 10 dB</option>
          <option value="OSC_20DB">Oscilloscope 20 dB</option>
        </select>
      </div>
    </section>

    <section class="panel" id="tuning-panel">
      <h2>Tuning</h2>

      <div class="field">
        <label for="tuning-vfo-a">VFO A (MHz)</label>
        <input
          type="number" id="tuning-vfo-a"
          min="0.030" max="75.000" step="0.000010"
          data-field="tuning.vfo_a_hz" data-coerce="mhz"
        />
      </div>

      <div class="field">
        <label for="tuning-vfo-b">VFO B (MHz)</label>
        <input
          type="number" id="tuning-vfo-b"
          min="0.030" max="75.000" step="0.000010"
          data-field="tuning.vfo_b_hz" data-coerce="mhz"
        />
      </div>

      <div class="field">
        <label for="tuning-mode">Mode</label>
        <select id="tuning-mode" data-field="tuning.mode">
          <option value="LSB">LSB</option>
          <option value="USB">USB</option>
          <option value="CW_U">CW-U</option>
          <option value="CW_L">CW-L</option>
          <option value="FM">FM</option>
          <option value="FM_N">FM-N</option>
          <option value="AM">AM</option>
          <option value="AM_N">AM-N</option>
          <option value="RTTY_L">RTTY-L</option>
          <option value="RTTY_U">RTTY-U</option>
          <option value="DATA_L">DATA-L</option>
          <option value="DATA_U">DATA-U</option>
          <option value="DATA_FM">DATA-FM</option>
          <option value="DATA_FM_N">DATA-FM-N</option>
          <option value="PSK">PSK</option>
        </select>
      </div>

      <div class="field">
        <label for="tuning-band">Band</label>
        <select id="tuning-band" data-field="tuning.band" data-set-only="true">
          <option value="" disabled selected>—</option>
          <option value="M160">160 m</option>
          <option value="M80">80 m</option>
          <option value="M60">60 m</option>
          <option value="M40">40 m</option>
          <option value="M30">30 m</option>
          <option value="M20">20 m</option>
          <option value="M17">17 m</option>
          <option value="M15">15 m</option>
          <option value="M12">12 m</option>
          <option value="M10">10 m</option>
          <option value="M6">6 m</option>
          <option value="GEN">General</option>
        </select>
      </div>

      <div class="field">
        <label>VFOs</label>
        <button class="action" id="tuning-swap" data-action="tuning.swap_vfo">Swap A ↔ B</button>
      </div>

      <div class="field">
        <label for="tuning-split">Split</label>
        <input type="checkbox" id="tuning-split" data-field="tuning.split" />
      </div>

      <div class="field">
        <label for="tuning-clar">CLAR (RX)</label>
        <input type="checkbox" id="tuning-clar" data-field="tuning.clar_rx_enabled" />
      </div>
    </section>

    <section class="panel" id="rx-panel">
      <h2>RX DSP</h2>

      <div class="field">
        <label>Preamp</label>
        <div class="radio-group" data-field="rx.preamp">
          <button data-value="IPO">IPO</button>
          <button data-value="AMP1">AMP1</button>
          <button data-value="AMP2">AMP2</button>
        </div>
      </div>

      <div class="field">
        <label>Attenuator</label>
        <div class="radio-group" data-field="rx.attenuator">
          <button data-value="OFF">Off</button>
          <button data-value="DB6">6 dB</button>
          <button data-value="DB12">12 dB</button>
          <button data-value="DB18">18 dB</button>
        </div>
      </div>

      <div class="field">
        <label>AGC</label>
        <div class="radio-group" data-field="rx.agc" data-set-as="AgcSet">
          <button data-value="OFF">Off</button>
          <button data-value="FAST">Fast</button>
          <button data-value="MID">Mid</button>
          <button data-value="SLOW">Slow</button>
          <button data-value="AUTO">Auto</button>
        </div>
      </div>

      <div class="field">
        <label for="rx-nb">NB</label>
        <input type="checkbox" id="rx-nb" data-field="rx.nb_enabled" />
      </div>

      <div class="field">
        <label for="rx-nb-level">NB level</label>
        <input
          type="range" id="rx-nb-level"
          min="0" max="10" step="1" value="0"
          data-field="rx.nb_level"
        />
      </div>

      <div class="field">
        <label for="rx-nr">NR</label>
        <input type="checkbox" id="rx-nr" data-field="rx.nr_enabled" />
      </div>

      <div class="field">
        <label for="rx-nr-level">NR level</label>
        <input
          type="range" id="rx-nr-level"
          min="1" max="15" step="1" value="1"
          data-field="rx.nr_level"
        />
      </div>

      <div class="field">
        <label for="rx-auto-notch">Auto Notch</label>
        <input type="checkbox" id="rx-auto-notch" data-field="rx.auto_notch_enabled" />
      </div>

      <div class="field">
        <label for="rx-notch">Notch</label>
        <input type="checkbox" id="rx-notch" data-field="rx.manual_notch_enabled" />
      </div>

      <div class="field">
        <label for="rx-notch-freq">Notch freq (Hz)</label>
        <input
          type="number" id="rx-notch-freq"
          min="10" max="3200" step="10" value="10"
          data-field="rx.manual_notch_freq_hz"
        />
      </div>

      <div class="field">
        <label for="rx-contour">Contour</label>
        <input type="checkbox" id="rx-contour" data-field="rx.contour_enabled" />
      </div>

      <div class="field">
        <label for="rx-contour-freq">Contour freq (Hz)</label>
        <input
          type="number" id="rx-contour-freq"
          min="10" max="3200" step="10" value="10"
          data-field="rx.contour_freq_hz"
        />
      </div>

      <div class="field">
        <label for="rx-apf">APF</label>
        <input type="checkbox" id="rx-apf" data-field="rx.apf_enabled" />
      </div>

      <div class="field">
        <label for="rx-apf-freq">APF freq (Hz)</label>
        <input
          type="number" id="rx-apf-freq"
          min="-250" max="250" step="10" value="0"
          data-field="rx.apf_freq_hz"
        />
      </div>

      <div class="field">
        <label for="rx-if-shift">IF shift (Hz)</label>
        <input
          type="range" id="rx-if-shift"
          min="-1200" max="1200" step="20" value="0"
          data-field="rx.if_shift_hz"
        />
      </div>

      <div class="field">
        <label for="rx-filter-width">Filter width</label>
        <select id="rx-filter-width" data-field="rx.filter_width_index">
          <option value="0">0 (narrowest)</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
          <option value="16">16</option>
          <option value="17">17</option>
          <option value="18">18</option>
          <option value="19">19</option>
          <option value="20">20</option>
          <option value="21">21</option>
          <option value="22">22</option>
          <option value="23">23 (widest)</option>
        </select>
      </div>
    </section>

    <section class="panel panel--meters" id="meters-panel">
      <h2>Meters</h2>

      <div class="field">
        <label>S-meter</label>
        <div>
          <div class="meter-bar"><div class="meter-bar__fill" id="meters-smeter-fill"></div></div>
          <span id="meters-smeter-display">—</span>
        </div>
      </div>

      <div class="field">
        <label for="meters-af-gain">AF gain</label>
        <input
          type="range" id="meters-af-gain"
          min="0" max="255" step="1" value="0"
          data-field="meters.af_gain"
        />
      </div>

      <div class="field">
        <label for="meters-rf-gain">RF gain</label>
        <input
          type="range" id="meters-rf-gain"
          min="0" max="255" step="1" value="0"
          data-field="meters.rf_gain"
        />
      </div>
    </section>
  </main>

  <footer>
    <details>
      <summary>Live state (debug)</summary>
      <pre id="state-dump"></pre>
    </details>
  </footer>

  <script src="app.js"></script>
</body>
</html>
